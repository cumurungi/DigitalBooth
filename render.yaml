services:
  - type: web
    name: digitalbooth-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: COUPLE_ACCESS_CODE
        sync: false
      - key: COUPLE_SESSION_SECRET
        sync: false
      - key: PUBLIC_API_BASE_URL
        generateValue: true